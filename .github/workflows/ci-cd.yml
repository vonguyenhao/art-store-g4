name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Validate application
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: art_store_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        # Third-party GitHub Action that installs PHP and required extensions on the runner.
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, mysqli, pdo_mysql
          coverage: none

      - name: Validate Composer file
        run: |
          if [ -f composer.json ]; then
            composer validate --strict
          else
            echo "No composer.json found; skipping Composer validation."
          fi

      - name: Install Composer dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist --no-progress
          else
            echo "No composer.json found; skipping dependency installation."
          fi

      - name: Lint PHP files
        run: |
          mapfile -d '' files < <(find . -name "*.php" -not -path "./vendor/*" -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No PHP files found; skipping syntax lint."
            exit 0
          fi

          for file in "${files[@]}"; do
            php -l "$file"
          done

      - name: Run PHPUnit tests
        run: |
          if [ -x vendor/bin/phpunit ]; then
            vendor/bin/phpunit
          else
            echo "PHPUnit is not installed yet; skipping tests."
          fi

      - name: Smoke test database schema
        run: |
          if [ -f database/schema.sql ]; then
            mysql -h 127.0.0.1 -P 3306 -uroot -proot art_store_test < database/schema.sql
          else
            echo "No database/schema.sql found; skipping schema smoke test."
          fi

      - name: Build deploy artefact
        run: |
          mkdir -p build/art-store
          rsync -a \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "build" \
            --exclude "tests" \
            --exclude ".env" \
            --exclude "node_modules" \
            ./ build/art-store/

      - name: Upload deploy artefact
        uses: actions/upload-artifact@v4
        with:
          name: art-store-build
          path: build/art-store

  deploy:
    name: Deploy to Spinetail
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check deployment configuration
        id: deploy_config
        env:
          SPINETAIL_HOST: ${{ secrets.SPINETAIL_HOST }}
          SPINETAIL_USER: ${{ secrets.SPINETAIL_USER }}
          SPINETAIL_SSH_KEY: ${{ secrets.SPINETAIL_SSH_KEY }}
          SPINETAIL_PATH: ${{ secrets.SPINETAIL_PATH }}
        run: |
          if [ -n "$SPINETAIL_HOST" ] && [ -n "$SPINETAIL_USER" ] && [ -n "$SPINETAIL_SSH_KEY" ] && [ -n "$SPINETAIL_PATH" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "Deployment secrets are not configured; skipping deploy."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download deploy artefact
        if: steps.deploy_config.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: art-store-build
          path: build/art-store

      - name: Configure SSH
        if: steps.deploy_config.outputs.configured == 'true'
        env:
          SPINETAIL_HOST: ${{ secrets.SPINETAIL_HOST }}
          SPINETAIL_SSH_KEY: ${{ secrets.SPINETAIL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SPINETAIL_SSH_KEY" > ~/.ssh/spinetail_key
          chmod 600 ~/.ssh/spinetail_key
          ssh-keyscan -H "$SPINETAIL_HOST" >> ~/.ssh/known_hosts

      - name: Deploy files
        if: steps.deploy_config.outputs.configured == 'true'
        env:
          SPINETAIL_HOST: ${{ secrets.SPINETAIL_HOST }}
          SPINETAIL_USER: ${{ secrets.SPINETAIL_USER }}
          SPINETAIL_PATH: ${{ secrets.SPINETAIL_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/spinetail_key" \
            build/art-store/ "$SPINETAIL_USER@$SPINETAIL_HOST:$SPINETAIL_PATH"
